<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>講座詳細 | ホリスケアアカデミー</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #2BBCD4; --teal-dark: #1A9AB0; --teal-light: #E0F7FB; --teal-pale: #F0FBFD;
      --pink: #F2708A; --pink-light: #FEF0F3;
      --yellow: #FFD84D; --yellow-light: #FFFBEB;
      --green: #4CAF72; --green-light: #EBF7EF;
      --orange: #E8823A; --orange-light: #FEF3E8;
      --white: #FFFFFF; --bg: #F2F8FA; --text: #1A3A40;
      --text-mid: #4A7A85; --text-light: #8AB8C0;
      --border: #C8EAF0; --red: #E05050;
      --shadow: rgba(43,188,212,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header {
      background: white; border-bottom: 3px solid var(--teal);
      padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 10px var(--shadow);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      background: none; border: 1.5px solid var(--border); color: var(--text-mid);
      border-radius: 20px; padding: 6px 14px; font-size: 12px; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
    }
    .back-btn:hover { background: var(--teal-light); border-color: var(--teal); }
    .header-logo img { height: 36px; width: auto; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-name { font-size: 13px; color: var(--text-mid); }
    .logout-btn {
      background: none; border: 1.5px solid var(--border); color: var(--text-mid);
      border-radius: 20px; padding: 6px 14px; font-size: 12px; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
    }
    .logout-btn:hover { background: var(--teal-light); border-color: var(--teal); }

    .course-header {
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      padding: 20px 24px; color: white;
    }
    .course-header h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .course-header p { font-size: 13px; opacity: 0.85; }

    .page-wrap { max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; }

    .section-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .section-title::before {
      content: ''; display: block; width: 4px; height: 18px;
      background: var(--teal); border-radius: 2px;
    }
    .badge-count {
      background: var(--pink); color: white; font-size: 11px; font-weight: 700;
      border-radius: 10px; padding: 1px 7px; margin-left: 4px;
    }

    /* お知らせ */
    .notice-section { margin-bottom: 28px; }
    .notice-card {
      background: white; border-radius: 12px; border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow); overflow: hidden;
    }
    .notice-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
    }
    .notice-item:last-child { border-bottom: none; }
    .notice-item:hover { background: var(--teal-pale); }
    .notice-item.unread { background: #FFFBF0; }
    .notice-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--yellow); flex-shrink: 0; margin-top: 5px; }
    .notice-item:not(.unread) .notice-dot { background: var(--border); }
    .notice-date { font-size: 11px; color: var(--text-light); margin-bottom: 2px; }
    .notice-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .notice-preview { font-size: 12px; color: var(--text-mid); line-height: 1.5; }

    /* グリッド */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }

    /* カード */
    .card {
      background: white; border-radius: 12px; border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow); padding: 20px;
    }
    .card-title {
      font-size: 14px; font-weight: 700; color: var(--text);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .card-icon {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .icon-teal { background: var(--teal-light); }
    .icon-orange { background: var(--orange-light); }
    .icon-green { background: var(--green-light); }

    /* 受講内容 */
    .app-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .app-row:last-child { border-bottom: none; }
    .app-label { color: var(--text-mid); }
    .app-value { color: var(--text); font-weight: 500; }
    .status-badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .status-入金待ち, .status-pending, .status-awaiting_payment { background: var(--yellow-light); color: #B8860B; }
    .status-受講確定, .status-confirmed { background: var(--teal-light); color: var(--teal-dark); }
    .status-動画教材完了, .status-video_done { background: var(--orange-light); color: var(--orange); }
    .status-添削課題完了, .status-task_done { background: var(--pink-light); color: var(--pink); }
    .status-OJT完了, .status-ojt_done { background: #F3E8FF; color: #7C3AED; }
    .status-修了, .status-completed { background: var(--green-light); color: #2E7D47; }
    .status-キャンセル, .status-cancelled { background: #F5F5F5; color: #888; }
    .status-未対応 { background: var(--yellow-light); color: #B8860B; }

    /* 添削課題 */
    .task-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .task-item:last-child { border-bottom: none; }
    .task-num {
      width: 26px; height: 26px; border-radius: 50%; background: var(--teal-light);
      color: var(--teal-dark); font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .task-name { font-size: 12px; color: var(--text); line-height: 1.4; }
    .task-count { font-size: 11px; color: var(--text-light); margin-top: 2px; }
    .task-status {
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 10px; flex-shrink: 0; white-space: nowrap;
    }
    .task-未提出 { background: #F5F5F5; color: #888; }
    .task-提出済 { background: var(--yellow-light); color: #B8860B; }
    .task-合格 { background: var(--green-light); color: #2E7D47; }
    .task-btn {
      background: var(--teal); color: white; border: none; border-radius: 6px;
      padding: 5px 10px; font-size: 11px; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; flex-shrink: 0;
    }
    .task-btn:hover { background: var(--teal-dark); }

    /* 動画教材 */
    .video-section { margin-bottom: 28px; }
    .video-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .video-item:last-child { border-bottom: none; }
    .video-thumb {
      width: 44px; height: 44px; border-radius: 8px; background: var(--teal-light);
      display: flex; align-items: center; justify-content: center;
      color: var(--teal); font-size: 18px; flex-shrink: 0;
    }
    .video-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .video-duration { font-size: 11px; color: var(--text-light); }
    .video-btn {
      background: var(--teal); color: white; border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 12px; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; flex-shrink: 0;
      transition: background 0.2s;
    }
    .video-btn:hover { background: var(--teal-dark); }

    /* 書類発行 */
    .doc-section { margin-bottom: 28px; }
    .doc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .doc-btn {
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 14px 8px; cursor: pointer; text-align: center;
      font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .doc-btn:hover { border-color: var(--teal); background: var(--teal-pale); }
    .doc-icon { font-size: 24px; }
    .doc-label { font-size: 13px; font-weight: 700; color: var(--text); }
    .doc-sub { font-size: 10px; color: var(--text-light); }

    /* 課題モーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 16px; width: 100%; max-width: 480px;
      max-height: 80vh; overflow-y: auto; padding: 24px;
    }
    .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
    .modal-close {
      float: right; background: none; border: none; font-size: 20px;
      cursor: pointer; color: var(--text-light); margin-top: -4px;
    }

    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
      .doc-grid { grid-template-columns: repeat(3, 1fr); }
      .page-wrap { padding: 20px 12px 60px; }
      .course-header { padding: 16px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="back-btn" onclick="window.location.href='mypage.html'">← 戻る</button>
    <img src="holiscare_logo.png" alt="ホリスケアアカデミー" style="height:32px;" onerror="this.style.display='none'">
  </div>
  <div class="header-right">
    <span class="header-name" id="header-name"></span>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
</header>

<div class="course-header">
  <h2 id="course-title">講座詳細</h2>
  <p id="course-subtitle">受講番号：読み込み中...</p>
</div>

<div class="page-wrap">

  <!-- お知らせ -->
  <div class="notice-section">
    <div class="section-title">📢 お知らせ・連絡</div>
    <div class="notice-card" id="notice-list">
      <div class="notice-item">
        <div class="notice-dot" style="background:var(--border);"></div>
        <div><div class="notice-title" style="color:var(--text-light);">読み込み中...</div></div>
      </div>
    </div>
  </div>

  <!-- 受講内容・添削 -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title">
        <div class="card-icon icon-teal">📋</div>
        受講内容・ステータス
      </div>
      <div id="app-detail">
        <div class="app-row"><span class="app-label">講座名</span><span class="app-value" id="app-course">—</span></div>
        <div class="app-row"><span class="app-label">受講料</span><span class="app-value" id="app-fee">—</span></div>
        <div class="app-row"><span class="app-label">支払方法</span><span class="app-value" id="app-payment">—</span></div>
        <div class="app-row"><span class="app-label">テキスト</span><span class="app-value" id="app-textbook">—</span></div>
        <div class="app-row">
          <span class="app-label">ステータス</span>
          <span class="status-badge status-未対応" id="app-status">—</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <div class="card-icon icon-orange">📝</div>
        添削課題の進捗
      </div>
      <div id="task-list">
        <div class="task-item"><span style="color:var(--text-light); font-size:13px;">読み込み中...</span></div>
      </div>
    </div>
  </div>

  <!-- 動画教材 -->
  <div class="video-section">
    <div class="section-title">🎬 動画教材</div>
    <div class="card">
      <div id="video-list">
        <div style="color:var(--text-light); font-size:13px;">読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- 書類の発行 -->
  <div class="doc-section">
    <div class="section-title">📄 書類の発行</div>
    <div class="card">
      <p style="font-size:13px; color:var(--text-mid); margin-bottom:16px;">見積書・請求書・領収書を発行できます。宛名は変更可能です。</p>
      <div style="margin-bottom:14px;">
        <label style="font-size:12px; color:var(--text-mid); display:block; margin-bottom:5px;">宛名（デフォルト：お名前）</label>
        <input type="text" id="doc-name" placeholder="例）山田太郎　または　○○株式会社"
          style="width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-family:'Noto Sans JP',sans-serif; font-size:13px; outline:none;">
      </div>
      <div class="doc-grid">
        <button class="doc-btn" onclick="generateDoc('見積書')">
          <span class="doc-icon">📋</span>
          <span class="doc-label">見積書</span>
          <span class="doc-sub">PDF発行</span>
        </button>
        <button class="doc-btn" onclick="generateDoc('請求書')">
          <span class="doc-icon">📑</span>
          <span class="doc-label">請求書</span>
          <span class="doc-sub">PDF発行</span>
        </button>
        <button class="doc-btn" onclick="generateDoc('領収書')">
          <span class="doc-icon">🧾</span>
          <span class="doc-label">領収書</span>
          <span class="doc-sub">PDF発行</span>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- 課題モーダル -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeTask()">✕</button>
    <div class="modal-title" id="modal-title">課題</div>
    <div id="modal-content"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const cfg = {
    apiKey: "AIzaSyCl48Fay9AbMLRXJ7npya4PJIgDQPvltxs",
    authDomain: "holiscare-academy.firebaseapp.com",
    projectId: "holiscare-academy",
  };
  const app = initializeApp(cfg);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.__auth = auth;
  window.__signOut = signOut;

  // URLパラメータからdocId取得
  const docId = new URLSearchParams(location.search).get('id');
  if (!docId) window.location.href = 'mypage.html';

  const statusLabel = {
    pending: '入金待ち', awaiting_payment: '入金待ち',
    confirmed: '受講確定', video_done: '動画教材完了',
    task_done: '添削課題完了', ojt_done: 'OJT完了',
    completed: '修了', cancelled: 'キャンセル',
  };

  const tasks = [
    { num: 1, name: '介護における尊厳の保持・自立支援', count: '26問' },
    { num: 2, name: '介護・福祉サービスの理解と医療との連携', count: '27問' },
    { num: 3, name: '介護におけるコミュニケーション技術', count: '25問' },
    { num: 4, name: 'こころとからだのしくみと生活支援技術（1）', count: '25問' },
    { num: 5, name: 'こころとからだのしくみと生活支援技術（2）', count: '26問' },
  ];

  const videos = [
    { title: '第1章：介護の基本理念と尊厳の保持', duration: '約45分' },
    { title: '第2章：介護保険制度と福祉サービス', duration: '約50分' },
    { title: '第3章：コミュニケーション技術', duration: '約40分' },
  ];

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'mypage_login.html'; return; }

    const name = user.displayName || user.email;
    document.getElementById('header-name').textContent = name + ' さん';
    document.getElementById('doc-name').value = name;
    document.getElementById('doc-name').placeholder = name;

    // 申し込みデータ取得
    try {
      const snap = await getDoc(doc(db, 'applications', docId));
      if (!snap.exists()) { window.location.href = 'mypage.html'; return; }

      const data = snap.data();
      const status = data.status || 'pending';
      const statusText = statusLabel[status] || status;

      document.getElementById('course-title').textContent = data.course || 'オンライン初任者研修';
      document.getElementById('course-subtitle').textContent = '受講番号：' + (data.studentNo || '—');
      document.getElementById('app-course').textContent = data.course || 'オンライン初任者研修';
      document.getElementById('app-fee').textContent = data.fee || '33,000円（税込）';
      document.getElementById('app-payment').textContent = data.payment || '—';
      document.getElementById('app-textbook').textContent =
        (data.textbook === 'purchase' || data.textbook === '購入（6,600円）') ? '購入（6,600円）' : (data.textbook || '—');
      const statusEl = document.getElementById('app-status');
      statusEl.textContent = statusText;
      statusEl.className = 'status-badge status-' + statusText;

      // 添削課題
      const taskList = document.getElementById('task-list');
      taskList.innerHTML = tasks.map(t => `
        <div class="task-item">
          <div class="task-num">${t.num}</div>
          <div style="flex:1;">
            <div class="task-name">${t.name}</div>
            <div class="task-count">${t.count}</div>
          </div>
          <span class="task-status task-未提出">未提出</span>
          <button class="task-btn" onclick="openTask(${t.num})">回答する</button>
        </div>
      `).join('');

      // 動画教材
      const videoList = document.getElementById('video-list');
      videoList.innerHTML = videos.map(v => `
        <div class="video-item">
          <div class="video-thumb">▶</div>
          <div style="flex:1;">
            <div class="video-title">${v.title}</div>
            <div class="video-duration">${v.duration}</div>
          </div>
          <button class="video-btn" onclick="alert('動画URLは管理者が設定します')">視聴する</button>
        </div>
      `).join('');

    } catch(e) {
      console.error(e);
    }

    // お知らせ
    document.getElementById('notice-list').innerHTML = `
      <div class="notice-item unread">
        <div class="notice-dot"></div>
        <div>
          <div class="notice-date">2026年4月20日</div>
          <div class="notice-title">受講開始のご案内</div>
          <div class="notice-preview">オンライン初任者研修の受講が開始されました。動画教材をご覧いただけます。</div>
        </div>
      </div>
      <div class="notice-item">
        <div class="notice-dot" style="background:var(--border);"></div>
        <div>
          <div class="notice-date">2026年4月18日</div>
          <div class="notice-title">お申し込みありがとうございます</div>
          <div class="notice-preview">ホリスケアアカデミーへのお申し込みを受け付けました。</div>
        </div>
      </div>
    `;
  });

  window.__appData = {};
</script>

<script>
  async function doLogout() {
    await window.__signOut(window.__auth);
    window.location.href = 'mypage_login.html';
  }
  window.doLogout = doLogout;

  function openTask(num) {
    document.getElementById('modal-title').textContent = '添削課題 ' + num;
    document.getElementById('modal-content').innerHTML = '<p style="color:var(--text-mid); font-size:13px;">課題システムは準備中です。</p>';
    document.getElementById('task-modal').classList.add('open');
  }
  window.openTask = openTask;

  function closeTask() {
    document.getElementById('task-modal').classList.remove('open');
  }
  window.closeTask = closeTask;

  function generateDoc(type) {
    const name = document.getElementById('doc-name').value || 'お客様';
    alert(`${type}の発行機能は準備中です。\n宛名：${name}`);
  }
  window.generateDoc = generateDoc;
</script>

</body>
</html>
